{{- if .Values.externalSecrets.enabled }}
## =============================================================================
## nico-roots — sync site-root CA cert to all nico-managed namespaces.
## Source: site-root Secret in cert-manager namespace.
## Target: nico-roots Secret in every namespace labeled
##         nico.nvidia.com/managed=true
## creationPolicy: Orphan — ESO syncs value but does not set ownerReference,
##   so GC never cascades a delete to nico-roots if the ExternalSecret churns.
## =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: nico-roots-eso
spec:
  namespaceSelector:
    matchLabels:
      nico.nvidia.com/managed: "true"
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: cert-manager-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: nico-roots
      creationPolicy: Orphan
      template:
        type: Opaque
        data:
          ca.crt: "{{`{{ .site_ca }}`}}"
    data:
      - secretKey: site_ca
        remoteRef:
          key: site-root
          property: ca.crt

## =============================================================================
## nico-db-eso — sync operator-generated DB credentials → nico-system.
## Source: nico-system.nico.nico-pg-cluster.credentials.postgresql.acid.zalan.do
##         in postgres namespace (created automatically by Zalando operator).
## Target: nico-system.nico.nico-pg-cluster.credentials in nico-system
##         (same name nico-api reads — application side unchanged).
## =============================================================================
{{- if .Values.postgresql.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: nico-db-eso
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: ["{{ .Values.namespace }}"]
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: postgres-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: nico-system.nico.nico-pg-cluster.credentials
      deletionPolicy: Retain
    dataFrom:
      - extract:
          key: nico-system.nico.nico-pg-cluster.credentials.postgresql.acid.zalan.do
          version: v1
{{- end }}
{{- end }}
