{{- if .Values.vault.configJob.enabled }}
## =============================================================================
## Vault PKI Configuration Job (post-install hook)
## Uses only tools built into hashicorp/vault image (busybox wget/sed/grep).
## No apk install — works on clusters without outbound internet access.
##
## Flow:
##   initContainer: wait for Vault to be healthy (HTTPS, tls-skip-verify)
##   container:     wait for site-root Secret, then:
##     - Import site-root CA into Vault PKI engine (forgeca)
##     - Configure PKI role (forge-cluster) with SPIFFE URI SANs
##     - Optionally configure PKI role for Infra Controller CLI client certificates
##     - Enable Kubernetes auth, bind cert-manager SA
##     - Create cert-manager-forge-policy + forge-vault-policy
##     - Enable KV v2 at secrets/
##     - Enable AppRole, create the Infra Controller AppRole named carbide
##
## Token read from vaultroottoken K8s secret (written by unseal_vault.sh).
## =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-pki-config-sa
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-pki-config-reader
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["site-root"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-pki-config-reader
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-pki-config-reader
subjects:
  - kind: ServiceAccount
    name: vault-pki-config-sa
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-pki-config
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: vault-pki-config-sa
      restartPolicy: Never
      initContainers:
        ## ---------------------------------------------------------------
        ## Wait for Vault to be unsealed and accepting requests.
        ## Uses the vault binary (same image as configure) so TLS skip-verify
        ## works reliably with self-signed certs.
        ## ---------------------------------------------------------------
        - name: wait-vault
          image: {{ .Values.vault.configJob.vaultImage | quote }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_SKIP_VERIFY
              value: "true"
          command:
            - sh
            - -c
            - |
              echo "Waiting for Vault at {{ .Values.vault.address }} to be unsealed..."
              until vault status -tls-skip-verify -format=json 2>/dev/null \
                | grep -q '"sealed":[[:space:]]*false'; do
                echo "  Vault sealed or unreachable, retrying in 5s..."
                sleep 5
              done
              echo "Vault is unsealed, waiting 15s for leader election to stabilize..."
              sleep 15
              echo "Vault ready"
      containers:
        ## ---------------------------------------------------------------
        ## Configure Vault PKI using only vault CLI + busybox tools
        ## No apk install required.
        ## ---------------------------------------------------------------
        - name: configure
          image: {{ .Values.vault.configJob.vaultImage | quote }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_SKIP_VERIFY
              value: "true"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: carbide-vault-token
                  key: token
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # Use env-var based API server address — avoids cluster DNS (broken on this cluster)
              APISERVER="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              OPERATORS_NS="{{ .Values.certManagerNamespace }}"

              # ---- Wait for site-root Secret to exist ----
              echo "Waiting for site-root secret in ${OPERATORS_NS}..."
              until wget -q -O /tmp/secret.json \
                --header "Authorization: Bearer ${SA_TOKEN}" \
                --no-check-certificate \
                "${APISERVER}/api/v1/namespaces/${OPERATORS_NS}/secrets/site-root" 2>/dev/null; do
                echo "  site-root not ready, retrying in 5s..."
                sleep 5
              done
              echo "site-root Secret found"

              # ---- Extract CA cert and key using sed (no jq needed) ----
              CERT_B64=$(sed -n 's/.*"tls\.crt": *"\([^"]*\)".*/\1/p' /tmp/secret.json)
              KEY_B64=$(sed -n 's/.*"tls\.key": *"\([^"]*\)".*/\1/p' /tmp/secret.json)
              CA_CERT=$(echo "$CERT_B64" | base64 -d)
              CA_KEY=$(echo "$KEY_B64" | base64 -d)
              echo "CA cert and key extracted"

              # ---- Enable PKI engine ----
              echo "Enabling PKI engine at {{ .Values.vault.pkiMount }}/..."
              vault secrets enable -path={{ .Values.vault.pkiMount }} pki 2>/dev/null || true
              vault secrets tune -max-lease-ttl=87600h {{ .Values.vault.pkiMount }}

              # ---- Import CA bundle ----
              echo "Importing site-root CA into Vault PKI..."
              printf '%s\n%s' "$CA_CERT" "$CA_KEY" | \
                vault write {{ .Values.vault.pkiMount }}/config/ca pem_bundle=-

              # ---- Create PKI role ----
              echo "Creating PKI role {{ .Values.vault.pkiRole }}..."
              vault write {{ .Values.vault.pkiMount }}/roles/{{ .Values.vault.pkiRole }} \
                allow_any_name=true \
                allowed_uri_sans="spiffe://*" \
                max_ttl=720h \
                ttl=720h \
                key_type=ec \
                key_bits=256 \
                require_cn=false \
                use_csr_common_name=true

              {{ if .Values.vault.nicoCliClientRole.enabled }}
              # ---- Create Infra Controller CLI client PKI role ----
              echo "Creating PKI role {{ .Values.vault.nicoCliClientRole.name }}..."
              vault write {{ .Values.vault.pkiMount }}/roles/{{ .Values.vault.nicoCliClientRole.name }} \
                allow_any_name=true \
                enforce_hostnames=false \
                cn_validations=disabled \
                client_flag=true \
                server_flag=false \
                key_type=ec \
                key_bits=256 \
                ttl=1h \
                max_ttl=12h \
                ou={{ .Values.vault.nicoCliClientRole.name | quote }}{{ if .Values.vault.nicoCliClientRole.organization }} \
                organization={{ .Values.vault.nicoCliClientRole.organization | quote }}{{ end }}
              {{ end }}

              # ---- Enable K8s auth ----
              echo "Configuring Kubernetes auth..."
              vault auth enable kubernetes 2>/dev/null || true
              vault write auth/kubernetes/config \
                kubernetes_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"

              # ---- Policies ----
              echo "Writing cert-manager-forge-policy..."
              vault policy write cert-manager-forge-policy - << 'POLICY'
              path "{{ .Values.vault.pkiMount }}/sign/{{ .Values.vault.pkiRole }}" {
                capabilities = ["create", "update"]
              }
              POLICY

              echo "Writing forge-vault-policy..."
              vault policy write forge-vault-policy - << 'POLICY'
              path "{{ .Values.vault.kvMount }}/data/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "{{ .Values.vault.kvMount }}/metadata/*" {
                capabilities = ["list", "read", "delete"]
              }
              path "{{ .Values.vault.pkiMount }}/issue/{{ .Values.vault.pkiRole }}" {
                capabilities = ["create", "update"]
              }
              POLICY

              # ---- K8s auth role for cert-manager ----
              echo "Creating K8s auth role for cert-manager..."
              vault write auth/kubernetes/role/cert-manager-forge-issuer \
                bound_service_account_names=cert-manager-vault-forgeca-issuer \
                bound_service_account_namespaces="{{ .Values.certManagerNamespace }}" \
                policies=cert-manager-forge-policy \
                ttl=1h

              {{ if .Values.vault.carbideApiK8sAuth.enabled }}
              # ---- K8s auth role for Infra Controller Core API ----
              # carbide-api authenticates to in-cluster Vault via its SA JWT
              # (vault SDK auto-detects /var/run/secrets/kubernetes.io/serviceaccount/token)
              # and reads BMC credentials from the KV mount (forge-vault-policy
              # grants read on {{ .Values.vault.kvMount }}/data/*).
              echo "Creating K8s auth role for Infra Controller Core API..."
              vault write auth/kubernetes/role/{{ .Values.vault.carbideApiK8sAuth.serviceAccountName }} \
                bound_service_account_names={{ .Values.vault.carbideApiK8sAuth.serviceAccountName }} \
                bound_service_account_namespaces="{{ .Values.namespace }}" \
                policies=forge-vault-policy \
                ttl={{ .Values.vault.carbideApiK8sAuth.tokenTTL }}
              {{ end }}

              # ---- KV v2 + AppRole ----
              echo "Enabling KV v2 at {{ .Values.vault.kvMount }}/..."
              vault secrets enable -path={{ .Values.vault.kvMount }} kv-v2 2>/dev/null || true

              echo "Enabling AppRole auth..."
              vault auth enable approle 2>/dev/null || true

              vault write auth/approle/role/carbide \
                token_policies=forge-vault-policy \
                token_ttl=1h \
                token_max_ttl=4h

              # ---- Write AppRole credentials to Vault KV for ESO sync ----
              # ESO reads these and patches carbide-vault-approle-tokens (creationPolicy:Merge),
              # replacing the placeholder values written by secrets.yaml at install time.
              # secret-id generation is idempotent: each run creates a new secret-id but does
              # not invalidate existing tokens issued from previous secret-ids.
              echo "Reading AppRole credentials and writing to KV for ESO sync..."
              ROLE_ID=$(vault read -field=role_id auth/approle/role/carbide/role-id)
              SECRET_ID=$(vault write -f -field=secret_id auth/approle/role/carbide/secret-id)
              vault kv put {{ .Values.vault.kvMount }}/carbide/approle \
                VAULT_ROLE_ID="${ROLE_ID}" \
                VAULT_SECRET_ID="${SECRET_ID}"

              # ---- Policy: ESO reads only the approle KV path ----
              echo "Writing eso-approle-policy..."
              vault policy write eso-approle-policy - << 'POLICY'
              path "{{ .Values.vault.kvMount }}/data/carbide/approle" {
                capabilities = ["read"]
              }
              path "{{ .Values.vault.kvMount }}/metadata/carbide/approle" {
                capabilities = ["read"]
              }
              POLICY

              # ---- K8s auth role for ESO (external-secrets SA) ----
              echo "Creating K8s auth role for ESO approle sync..."
              vault write auth/kubernetes/role/eso-approle-sync \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                policies=eso-approle-policy \
                ttl=1h

              echo ""
              echo "=== Vault PKI configuration complete ==="
{{- end }}
