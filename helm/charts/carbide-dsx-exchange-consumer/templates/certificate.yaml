apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: carbide-dsx-exchange-consumer-certificate
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carbide-dsx-exchange-consumer.labels" . | nindent 4 }}
spec:
  {{- include "carbide-dsx-exchange-consumer.certificateSpec" (dict "name" "carbide-dsx-exchange-consumer-certificate" "cert" .Values.certificate "global" .Values.global) | nindent 2 }}
