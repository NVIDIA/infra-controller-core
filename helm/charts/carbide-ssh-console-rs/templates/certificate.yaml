apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: carbide-ssh-console-rs-certificate
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carbide-ssh-console-rs.labels" . | nindent 4 }}
spec:
  {{- include "carbide-ssh-console-rs.certificateSpec" (dict "name" "carbide-ssh-console-rs-certificate" "cert" .Values.certificate "global" .Values.global) | nindent 2 }}
