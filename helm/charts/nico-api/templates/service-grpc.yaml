apiVersion: v1
kind: Service
metadata:
  name: nico-api
  namespace: {{ include "nico-api.namespace" . }}
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
    app: nico-api
spec:
  selector:
    {{- include "nico-api.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.grpc.port }}
      name: grpc
      protocol: TCP
