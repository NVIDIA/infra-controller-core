apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: carbide-hardware-health-certificate
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carbide-hardware-health.labels" . | nindent 4 }}
spec:
  {{- include "carbide-hardware-health.certificateSpec" (dict "name" "carbide-hardware-health-certificate" "cert" .Values.certificate "global" .Values.global) | nindent 2 }}
