apiVersion: v1
kind: Service
metadata:
  name: nico-bmc-proxy
  namespace: {{ include "nico-bmc-proxy.namespace" . }}
  labels:
    {{- include "nico-bmc-proxy.labels" . | nindent 4 }}
    app: nico-bmc-proxy
spec:
  selector:
    {{- include "nico-bmc-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.proxy.port }}
      name: proxy
      protocol: TCP
