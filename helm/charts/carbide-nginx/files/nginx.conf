# Main nginx configuration file

# Define the user and group nginx will run as
#user  nginx;
daemon off;

worker_processes  auto;

# Error log settings
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# Main event configuration
events {
    worker_connections  1024;
}

# HTTP configuration
http {
    # Include MIME types
    #include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log settings
    access_log  /dev/stdout;
    error_log /dev/stderr warn;

    # Timeouts
    sendfile        on;
    keepalive_timeout  65;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Gzip compression settings
    gzip on;
    gzip_disable "msie6";

    # Virtual server configuration (example)
    server {
        listen       80;
        server_name  localhost;

        # Document root
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Location for requests to "/"
        location / {
            try_files $uri $uri/ =404;
        }

        # Redirect server error pages to a static page
        error_page  500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }

        # Location for specific files, e.g., images
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires max;
            log_not_found off;
        }

        location = /basic_status {
            stub_status;
        }

	location /public/ {
	    alias /forge-boot-artifacts/;
	}

        # Proxy example (optional)
        # location /api/ {
        #     proxy_pass http://backend_server;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # }

        # SSL configuration (optional)
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/ssl/server.crt;
        # ssl_certificate_key /etc/nginx/ssl/server.key;
    }

    # Additional servers can be configured similarly
    # include /etc/nginx/conf.d/*.conf;
}
