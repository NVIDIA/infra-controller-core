{{- if .Values.externalService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: nginx-external
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carbide-nginx.labels" . | nindent 4 }}
  {{- with .Values.externalService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.externalService.type | default "LoadBalancer" }}
  {{- if .Values.externalService.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.externalService.externalTrafficPolicy }}
  {{- end }}
  selector:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: nginx
  ports:
    - port: 80
      targetPort: 80
      name: http
      protocol: TCP
{{- end }}
