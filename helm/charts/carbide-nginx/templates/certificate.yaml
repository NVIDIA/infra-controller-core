apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nginx-certificate
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carbide-nginx.labels" . | nindent 4 }}
spec:
  {{- include "carbide-nginx.certificateSpec" (dict "name" "nginx-certificate" "cert" .Values.certificate "global" .Values.global) | nindent 2 }}
