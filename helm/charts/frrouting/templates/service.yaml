apiVersion: v1
kind: Service
metadata:
  name: frrouting
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "frrouting.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "frrouting.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      name: bgp
      protocol: TCP
