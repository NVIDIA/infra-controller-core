{{- if .Values.config.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: carbide-pxe-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carbide-pxe.labels" . | nindent 4 }}
data:
  Rocket.toml: |
    {{- .Values.config.rocketToml | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.envFrom.pxeEnvConfig.configMapName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carbide-pxe.labels" . | nindent 4 }}
data:
  CARBIDE_API_HOST: {{ printf "carbide-api.%s.svc.cluster.local" .Values.global.namespace | quote }}
  CARBIDE_API_PORT: {{ .Values.config.carbideApiPort | default "1079" | quote }}
  {{- range $key, $value := .Values.config.extraEnvData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
