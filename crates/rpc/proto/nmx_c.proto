// Version 07-Apr-2025

// In this proto file: Node = OS Instance

syntax = "proto3";

// Upstream NMX-C API style (camelCase fields, legacy service name, 4-space indent) does not
// match this repository's default protolint rules; keep wire/API compatibility.
// protolint:disable FIELD_NAMES_LOWER_SNAKE_CASE
// protolint:disable SERVICE_NAMES_UPPER_CAMEL_CASE
// protolint:disable INDENT
// protolint:disable ENUM_NAMES_UPPER_CAMEL_CASE

package nmx_c;

enum ProtoMsgMajorVersion {
    PROTO_MSG_MAJOR_VERSION_UNDEFINED = 0;
    PROTO_MSG_MAJOR_VERSION_OBSOLETE1 = 1;
    PROTO_MSG_MAJOR_VERSION = 2;
}

enum ProtoMsgMinorVersion {
    PROTO_MSG_MINOR_VERSION_UNDEFINED = 0;
    PROTO_MSG_MINOR_VERSION_OBSOLETE1 = 1;
    PROTO_MSG_MINOR_VERSION_OBSOLETE2 = 2;
    PROTO_MSG_MINOR_VERSION_OBSOLETE3 = 3;
    PROTO_MSG_MINOR_VERSION = 20;

}

enum ST_ReturnCode {
    NMX_ST_UNDEFINED = 0;
    NMX_ST_SUCCESS = 1;
    NMX_ST_BADPARAM = 2;
    NMX_ST_GENERIC_ERROR = 3;
    NMX_ST_NOT_SUPPORTED = 4;
    NMX_ST_UNINITIALIZED = 5;
    NMX_ST_TIMEOUT = 6;
    NMX_ST_VERSION_MISMATCH = 7;
    NMX_ST_IN_USE = 8;
    NMX_ST_NOT_CONFIGURED = 9;
    NMX_ST_CONNECTION_NOT_VALID = 10;
    NMX_ST_NVLINK_ERROR = 11;
    NMX_ST_RESOURCE_BAD = 12;
    NMX_ST_RESOURCE_IN_USE = 13;
    NMX_ST_RESOURCE_NOT_IN_USE = 14;
    NMX_ST_RESOURCE_EXHAUSTED = 15;
    NMX_ST_RESOURCE_NOT_READY = 16;
    NMX_ST_PARTITION_EXISTS = 17;
    NMX_ST_PARTITION_ID_IN_USE = 18;
    NMX_ST_PARTITION_ID_NOT_IN_USE = 19;
    NMX_ST_PARTITION_NAME_IN_USE = 20;
    NMX_ST_PARTITION_NAME_NOT_IN_USE = 21;
    NMX_ST_PARTITION_ID_NAME_MISMATCH = 22;
    NMX_ST_NOT_READY = 23;

    NMX_ST_NMX_CONTROLLER_INTERNAL_ERROR = 500;
    NMX_ST_NMX_CONTROLLER_DB_ERROR = 501;
    NMX_ST_NMX_CONTROLLER_DB_CORRUPTION = 502;
    NMX_ST_NMX_CONTROLLER_INVALID_CONFIG_FILE = 503;
}

enum ControlPlaneState {
    NMX_CONTROL_PLANE_STATE_UNDEFINED  = 0;
    NMX_CONTROL_PLANE_STATE_OFFLINE    = 1;
    NMX_CONTROL_PLANE_STATE_STANDBY    = 2;
    NMX_CONTROL_PLANE_STATE_CONFIGURED = 3;
    NMX_CONTROL_PLANE_STATE_TIMEOUT    = 4;
    NMX_CONTROL_PLANE_STATE_ERROR      = 5;
    NMX_CONTROL_PLANE_STATE_UNCONFIGURED   = 6;
    NMX_CONTROL_PLANE_STATE_DEGRADED       = 7;
}

enum PortType {
    NMX_PORT_TYPE_UNDEFINED = 0;
    NMX_PORT_TYPE_GPU = 1;
    NMX_PORT_TYPE_SWITCH_ACCESS = 2;
    NMX_PORT_TYPE_SWITCH_TRUNK = 3;
    NMX_PORT_TYPE_FNM = 4;
    NMX_PORT_TYPE_HCA = 5;
}

enum DeviceType {
    NMX_DEVICE_TYPE_UNDEFINED   = 0;    //!< Undefined device type
    NMX_DEVICE_TYPE_SWITCH      = 1;    //!< Switch device
    NMX_DEVICE_TYPE_GPU         = 2;    //!< Gpu device
    NMX_DEVICE_TYPE_ROUTER      = 3;    //!< Router device
    NMX_DEVICE_TYPE_CA          = 4;    //!< Management device
}

enum ComputeNodeAttr {
    NMX_COMPUTE_NODE_ATTR_UNDEFINED = 0;
    NMX_COMPUTE_NODE_ATTR_ALL = 1;              //!< All Compute nodes
    NMX_COMPUTE_NODE_ATTR_FREE = 2;                 //!< Compute nodes with all GPUs available for partition creation
    NMX_COMPUTE_NODE_ATTR_FULLY_ALLOCATED = 3;      //!< Compute nodes with all GPUs allocated to partitions
    NMX_COMPUTE_NODE_ATTR_PARTIALLY_ALLOCATED = 4;  //!< Compute nodes with some GPUs allocated to partitions
}

enum ComputeNodeHealth {
    NMX_COMPUTE_NODE_HEALTH_UNKNOWN = 0;        //!< Unknown health state
    NMX_COMPUTE_NODE_HEALTH_HEALTHY = 1;            //!< Fully healthy
    NMX_COMPUTE_NODE_HEALTH_DEGRADED = 2;           //!< Some GPUs are degraded to NO_NVLINK
    NMX_COMPUTE_NODE_HEALTH_UNHEALTHY = 3;            //!< Unable to participate in NVLink
}

enum GpuAttr {
    NMX_GPU_ATTR_UNDEFINED = 0;
    NMX_GPU_ATTR_ALL = 1;           //!< All GPUs in the NVLink Domain
    NMX_GPU_ATTR_LOCATION = 2;          //!< All GPUs that are associated with a given Location
    NMX_GPU_ATTR_PARTITION_ID = 3;      //!< All GPUs that are associated with a given Partition ID
}

enum GpuHealth {
    NMX_GPU_HEALTH_UNKNOWN = 0;     //!< Unknown health state
    NMX_GPU_HEALTH_HEALTHY = 1;         //!< Fully healthy
    NMX_GPU_HEALTH_DEGRADED = 2;        //!< One or more links are down
    NMX_GPU_HEALTH_NO_NVLINK = 3;       //!< Unable to participate in NVLink partition
    NMX_GPU_HEALTH_DEGRADED_BW = 4;        //!< GPU operates in degraded bandwidth
}

enum SwitchNodeAttr {
    NMX_SWITCH_NODE_ATTR_UNDEFINED = 0;
    NMX_SWITCH_NODE_ATTR_ALL = 1;   //!< All Switch nodes
    NMX_SWITCH_NODE_ATTR_L1 = 2;        //!< L1 Switch nodes
    NMX_SWITCH_NODE_ATTR_L2 = 3;        //!< L2 Switch nodes
}

enum SwitchNodeHealth {
    NMX_SWITCH_NODE_HEALTH_UNKNOWN = 0;         //!< Unknown health state
    NMX_SWITCH_NODE_HEALTH_HEALTHY = 1;             //!< Fully healthy
    NMX_SWITCH_NODE_HEALTH_MISSING_NVLINK = 2;            //!< one or more devices within the node is unhealthy
    NMX_SWITCH_NODE_HEALTH_UNHEALTHY = 3;           //!< Fully unhealthy
}

enum SwitchHealth {
    NMX_SWITCH_HEALTH_UNKNOWN = 0;              //!< Unknown health state
    NMX_SWITCH_HEALTH_HEALTHY = 1;                 //!< Fully healthy
    NMX_SWITCH_HEALTH_MISSING_NVLINK = 2;                 //!< one or more links are unhealthy
    NMX_SWITCH_HEALTH_UNHEALTHY = 3;                //!< Fully unhealthy
}

enum PartitionInfoAttr {
    NMX_PARTITION_INFO_ATTR_UNDEFINED = 0;
    NMX_PARTITION_INFO_ATTR_ALL = 1;                 //!< All Partitions
    NMX_PARTITION_INFO_ATTR_NUM_GPUS = 2;            //!< Number of Partitions with a specific GPU size
    NMX_PARTITION_INFO_ATTR_NUM_COMPUTE_NODES = 3;    //!< Number of Partitions with a specific number of Compute nodes
}

enum PartitionHealth {
    NMX_PARTITION_HEALTH_UNKNOWN = 0;   //!< Unknown health state
    NMX_PARTITION_HEALTH_HEALTHY = 1;       //!< Partition is healthy
    NMX_PARTITION_HEALTH_DEGRADED_BANDWIDTH = 2;     //!< Partition is in degraded bandwidth
    NMX_PARTITION_HEALTH_DEGRADED = 3;              //!< One or more GPUs has routing disabled
    NMX_PARTITION_HEALTH_UNHEALTHY = 4;              //!< Partition is unhealthy
}

enum PartitionType {
    NMX_PARTITION_TYPE_UNDEFINED = 0;
    NMX_PARTITION_TYPE_LOCATION_BASED       = 1; //<! Partition is allocated based on GPU's physical location
    NMX_PARTITION_TYPE_GPUUID_BASED         = 2; //<! Partition is allocated based on GPU's Uid
}

enum LogicalLinkState {
    NMX_LOGICAL_LINK_NO_CHANGE = 0;
    NMX_LOGICAL_LINK_STATE_DOWN = 1;
    NMX_LOGICAL_LINK_STATE_INIT = 2;
    NMX_LOGICAL_LINK_STATE_ARMED = 3;
    NMX_LOGICAL_LINK_STATE_ACTIVE = 4;
    NMX_LOGICAL_LINK_STATE_ACT_DEFER = 5;
}

enum PhysicalPortState {
    NMX_PORT_PHYS_STATE_NO_CHANGE = 0;
    NMX_PORT_PHYS_STATE_SLEEP = 1;
    NMX_PORT_PHYS_STATE_POLLING = 2;
    NMX_PORT_PHYS_STATE_DISABLED = 3;
    NMX_PORT_PHYS_STATE_PORTCONFTRAIN = 4;
    NMX_PORT_PHYS_STATE_LINKUP = 5;
    NMX_PORT_PHYS_STATE_LINKERRRECOVER = 6;
    NMX_PORT_PHYS_STATE_PHYTEST = 7;
}

enum ConnState {
    NMX_NVLINK_CONN_STATE_UNKNOWN = 0;     //!< Unknown connection state
    NMX_NVLINK_CONN_STATE_ACTIVE = 1;      //!< Active link or connection state
    NMX_NVLINK_CONN_STATE_INACTIVE = 2;    //!< Inactive link or connection state
}

enum ConnType {
    NMX_NVLINK_CONN_TYPE_UNKNOWN = 0;            //!< Unknown connection type
    NMX_NVLINK_CONN_TYPE_ALL = 1;                    //!< Dump the GPU and switch connections
    NMX_NVLINK_CONN_TYPE_GPU = 2;                    //!< Dump the GPU connections
    NMX_NVLINK_CONN_TYPE_SWITCH = 3;                 //!< Dump the Switch connections
}

enum ConnAttr {
    NMX_NVLINK_CONN_ATTR_UNKNOWN = 0;              //!< Unknown connection attribute
    NMX_NVLINK_CONN_ATTR_EXPECTED = 1;                 //!< All expected connections as per FM Topology
    NMX_NVLINK_CONN_ATTR_DISCOVERED = 2;               //!< All discovered connections
    NMX_NVLINK_CONN_ATTR_EXPECTED_ACTIVE = 3;          //!< All expected active connections as per FM Topology
    NMX_NVLINK_CONN_ATTR_EXPECTED_INACTIVE = 4;        //!< All expected inactive connections
    NMX_NVLINK_CONN_ATTR_UNEXPECTED = 5;               //!< All unexpected connections which are discovered
}

enum ResiliencyMode {
    NMX_RESILIENCY_MODE_UNDEFINED = 0;      //!< Undefined resiliency mode
    NMX_RESILIENCY_MODE_FULL_BANDWIDTH = 1;     //!< Full bandwidth mode
    NMX_RESILIENCY_MODE_ADAPTIVE_BANDWIDTH = 2; //!< Adaptive bandwidth mode
    NMX_RESILIENCY_MODE_USER_ACTION_REQUIRED = 3;    //!< User action required mode
}

enum NmxControllerHealth {
    NMX_CONTROLLER_HEALTH_UNKNOWN = 0;
    NMX_CONTROLLER_HEALTH_HEALTHY = 1;
    NMX_CONTROLLER_HEALTH_DEGRADED = 2;
    NMX_CONTROLLER_HEALTH_UNHEALTHY = 3;
    NMX_CONTROLLER_HEALTH_UNHEALTHY_DB_CORRUPTED = 4;
}

enum AdminState {
    NMX_ADMIN_STATE_UNKNOWN = 0;
    NMX_ADMIN_STATE_UP = 1;
    NMX_ADMIN_STATE_DOWN = 2;
    NMX_ADMIN_STATE_DIAG = 3;
}

enum ReportType {
    NMX_REPORT_TYPE_UNKNOWN = 0;
    NMX_REPORT_TYPE_TOPOLOGY = 1;
    NMX_REPORT_TYPE_PARTITIONS = 2;
}

message ReturnCode {
    ServerHeader serverHeader = 1;
}

message KeyValPair {
    string key = 1;
    string value = 2;
}

message ServerHeader {
    string domain_uuid = 1;
    string app_uuid = 2;
    string app_ver = 3;
    ST_ReturnCode returnCode = 4;
}

message ClientHello {
    string gatewayId = 1;
    ProtoMsgMajorVersion major_version = 2;
    ProtoMsgMinorVersion minor_version = 3;
}

message ServerHello {
    ServerHeader serverHeader = 1;
    repeated KeyValPair components_ver = 2;
    repeated string capabilities = 3;
    string host_os_details = 4;
    ProtoMsgMajorVersion major_version = 5;
    ProtoMsgMinorVersion minor_version = 6;
}

message SubscriptionResponse {
    ServerHeader serverHeader = 1;
}

message HealthStateChanged {
    ServerHeader serverHeader = 1;
}

message FmEvent {
    ServerHeader serverHeader = 1;
    Context context = 2;
    oneof event {
        FmEventControlPlaneStateChange fmEventControlPlaneStateChange = 3;
        FmEventTopologyChange fmEventTopologyChange = 4;
        FmEventPartitionChange fmEventPartitionChange = 5;
    }
}

message InitDone {
    ServerHeader serverHeader = 1;
}

message ServerNotification {
    oneof notification {
        SubscriptionResponse subscriptionResponse = 1;      // sent only to requesting client
        StaticConfigResponse staticConfigResponse = 3;      // sent to all subscribed clients, except requesting client
        CreatePartitionResponse CreatePartitionResponse = 4;          // sent to all subscribed clients, except requesting client
        DeletePartitionResponse DeletePartitionResponse = 5;          // sent to all subscribed clients, except requesting client
        UpdatePartitionResponse UpdatePartitionResponse = 6;          // sent to all subscribed clients, except requesting client
        FmEvent fmEvent = 7;                                // sent to all subscribed clients
        HealthStateChanged healthStateChanged = 8;          // sent to all subscribed clients
        SetAdminStateResponse setAdminStateResponse = 9;    // sent to all subscribed clients, except requesting client
        DomainStateInfo domainStateInfo = 10;               // sent to clients that requested heartbeat at requested interval
        InitDone initDone = 11;          // sent to all subscribed clients
    }
}

message ConfigFileContent {
    string configFileName = 1;
    string configFileContent = 2;
}

message ConfigFileContents {
    repeated ConfigFileContent configFileContent = 1;
}

message ConfigFile {
    string configFileName = 1;
}

message ConfigFiles {
    repeated ConfigFile configFile = 1;
}

message ConfigKeyVal {
    string configFileName = 1;
    string key = 2;
    string value = 3;
}

message ConfigKeyVals {
    repeated ConfigKeyVal configKeyVal = 1;
}

message ConfigKey {
    string configFileName = 1;
    string key = 2;
}

message ConfigKeys {
    repeated ConfigKey configKey = 1;
}

// For future use, currently set context to ""
message Context {
    string context = 1;
}

message GetStaticConfigRequest {
    Context context = 1;
    oneof configRequest {
        ConfigKeys configKeys = 2;
        ConfigFiles configFiles = 3;
    }
    string gatewayId = 4;
}

message SetStaticConfigRequest {
    string gatewayId = 1;
    StaticConfig staticConfig = 2;
}

message StaticConfigResponse {
    ServerHeader serverHeader = 1;
    StaticConfig staticConfig = 2;
}

message StaticConfig {
    Context context = 1;
    oneof config {
        ConfigKeyVals configKeyVals = 2;
        ConfigFileContents configFileContents = 3;
    }
}

message SlotId {
    uint32 slotId = 1;
}

message PartitionId {
    uint32 partitionId = 1;
}

message Location {
    uint64 chassisId = 1;
    uint64 slotId = 2;
    uint64 hostId = 3;
}

message LocationInfo {
    string chassisSerialNumber = 2;
    uint64 trayIndex = 4;
    Location location = 6;
}

message DomainProperties {
    ServerHeader serverHeader = 1;
    Context context = 2;

    // NvLink Domain Specific Information
    reserved 3 to 9;

    // Compute Node and GPU Specific Information
    uint32 maxComputeNodes = 10;                            //!< Max Compute nodes in the NVLink Domain
    uint32 maxComputeNodesPerChassis = 11;                  //!< Max Compute nodes per Chassis
    uint32 maxGpusPerComputeNode = 12;                      //!< Max GPUs per Compute Node
    uint32 maxGpuNvLinks = 13;                              //!< Max links per GPU
    uint32 lineRateMBps = 14;                               //!< Max line Rate in MBps
    reserved 15 to 19;

    // Switch Node Specific Information
    uint32  maxSwitchNodes = 20;                             //!< Max Switch nodes in the NVLink Domain
    uint32  maxSwitchNodesPerChassis = 21;                   //!< Max Switch nodes per Chassis
    uint32  maxSwitchesPerSwitchNode = 22;                   //!< Max switches per Switch Node
    uint32  maxSwitchNvLinks = 23;                           //!< Max links per switch
    reserved 24 to 29;

    // GPU Partition Specific Information
    uint32  minGpusPerPartition = 30 [deprecated = true];    //!< Min GPUs in a partition
    uint32  maxNumPartitions = 31;                           //!< Maximum number of partitions
    uint32  maxNumAlids = 32;                                //!< Maximum number of ALids
    reserved 33 to 39;

    // Multicast Groups specific information
    uint32  maxMulticastGroups = 40;                         //!< Max multicast groups in the NVLink Domain
    reserved 41 to 49;

    uint32 maxNumPorts = 50;                                 //!< Maximum number of ports in this NVLink Domain
}

message DomainStateInfo {
    ServerHeader serverHeader = 1;
    Context context = 2;
    ControlPlaneState controlPlaneState = 3;
    uint32 availableMulticastGroups = 4;
    string configStatusDescription = 5;
    NmxControllerHealth nmxControllerHealth = 6;
}

message FmEventControlPlaneStateChange {
    Context context = 1;
}

message FmEventTopologyChange {
    Context context = 1;
}

message FmEventPartitionChange {
    Context context = 1;
    PartitionId partitionId = 2;
}

message PortTopoInfo {
    PortType portType = 1;
    uint64 portUid = 2;
    uint64 portNum = 3;
    uint64 peerPortDeviceUid = 4;
    uint64 peerPortNum = 5;
    PhysicalPortState physicalState = 6;
    LogicalLinkState logicalState = 7;
    uint64 subnetPrefix = 8;
    bool isSdnPort = 9;
    repeated PartitionId partitionIdList = 10;
    reserved 11 to 20;
    optional uint32 cageNum = 21;
    optional uint32 cagePortNum = 22;
    optional uint32 cageSplitPortNum = 23;
    optional uint64 baseLid = 24;
    optional uint64 systemPortNum = 25;
    optional uint64 computePortNum = 26;
    bool containAndDrain = 27;
    uint32 rail = 28;
    uint32 plane = 29;
    uint32 linkRateMbps = 30;
    AdminState portAdminState = 31;
}

message SwitchTopoInfo {
    LocationInfo loc = 1;
    uint64 topologyId = 2;
    uint64 deviceUid = 3;
    uint32 deviceId = 4;
    uint64 numPorts = 5;
    uint64 systemUid = 6;
    uint32 vendorId = 7;
    uint64 devicePcieId = 8;
    string description = 9;
    repeated PartitionId partitionId = 10;
    SwitchHealth deviceHealth = 11;
    repeated PortTopoInfo portTopoInfo = 12;
}

message GpuTopoInfo {
    LocationInfo loc = 1;
    uint64 topologyId = 2;
    uint64 deviceUid = 3;
    uint32 deviceId = 4;
    uint64 numPorts = 5;
    uint64 systemUid = 6;
    uint32 vendorId = 7;
    uint64 devicePcieId = 8;
    repeated uint64 aLids = 9;
    string description = 10;
    repeated PartitionId partitionId = 12;
    GpuHealth deviceHealth = 13;
    repeated PortTopoInfo portTopoInfo = 14;
}

message DeviceTopoInfo {
    oneof device {
        SwitchTopoInfo switchTopoInfo = 1;
        GpuTopoInfo gpuTopoInfo = 2;
    }
}

message GetTopologyInfoRequest {
    Context context = 1;
    string gatewayId = 3;
}

message FmTopologyInfo {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated DeviceTopoInfo deviceTopoInfo = 3;
}

message GetComputeNodeCountRequest {
    Context context = 1;
    ComputeNodeAttr attr = 2;
    uint64 chassisId = 3;                  //!<  Chassis ID(Optional)
    ComputeNodeHealth nodeHealth = 4;      //!<  Compute Node Health (Optional)
    string gatewayId = 5;
}

message GetComputeNodeCountResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    uint32 numNodes = 3;
}

message GetComputeNodeLocationListRequest {
    Context context = 1;
    ComputeNodeAttr attr = 2;
    ComputeNodeHealth nodeHealth = 3;     //!< Compute Node Health (Optional)
    uint64 chassisId = 4;                 //!< Chassis ID (Optional)
    uint32 numNodes = 5;
    string gatewayId = 6;
}

message GetComputeNodeLocationListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated Location locList = 3;
}

message GetComputeNodeInfoListRequest {
    Context context = 1;
    repeated Location locList = 2;  // Optional - if not provided response will include all discovered compute nodes
    string gatewayId = 3;
}

message ComputeNodeInfo {
    LocationInfo loc = 1;
    uint32 numGpus = 2;
    ComputeNodeHealth nodeHealth = 3;
    repeated PartitionId partitionIdList = 4;
}

message GetComputeNodeInfoListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated ComputeNodeInfo nodeInfoList = 3;
}

message GetGpuInfoListRequest {
    Context context = 1;
    GpuAttr attr = 2;
    uint32 numGpus = 3;               // Optional - if not provided the response includes all discovered GPUs that match filter
    Location loc = 4;                 //!<  Compute node location (required when GPU_ATTR_LOCATION_ID is specified)
    PartitionId partitionId = 5;      //!<  Partition ID (required when GPU_ATTR_PARTITION_ID is specified)
    string gatewayId = 6;
    GpuHealth gpuHealth = 7;          // Optional
}

message GpuInfo {
    LocationInfo loc = 1;
    uint32 gpuId = 2;
    uint64 gpuUid = 3;
    GpuHealth gpuHealth = 4;
    PartitionId partitionId = 5;
}

message GetGpuInfoListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated GpuInfo gpuInfoList = 3;
}

message GetSwitchNodeCountRequest {
    Context context = 1;
    SwitchNodeAttr attr = 2;
    SwitchNodeHealth nodeHealth = 3; //!<  Switch Node Health (Optional)
    uint32 numNodes = 4;
    string gatewayId = 5;
}

message GetSwitchNodeCountResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    uint32 numNodes = 3;
}

message GetSwitchNodeLocationListRequest {
    Context context = 1;
    SwitchNodeAttr attr = 2;
    SwitchNodeHealth nodeHealth = 3;   //!< Switch Node Health (Optional)
    uint32 numNodes = 4;
    string gatewayId = 5;
}

message GetSwitchNodeLocationListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated Location locList = 3;
}

message GetSwitchNodeInfoListRequest {
    Context context = 1;
    repeated Location locList = 2;  // Optional - if not provided response includes all discovered switch nodes
    string gatewayId = 3;
}

message SwitchNodeInfo {
    LocationInfo loc = 1;
    uint32 numSwitches = 2;
    SwitchNodeHealth nodeHealth = 3;
    repeated PartitionId partitionIdList = 4;
}

message GetSwitchNodeInfoListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated SwitchNodeInfo nodeInfoList = 3;
}

message GetSwitchInfoListRequest {
    Context context = 1;
    Location loc = 2;
    uint32 numSwitches = 3;  // Optional - if not provided response includes all discovered switches
    string gatewayId = 4;
}

message SwitchInfo {
    Location loc = 1;
    uint32 switchId = 2;
    uint64 switchUid = 3;
    uint32 numPorts = 4;
    SwitchHealth health = 5;
}

message GetSwitchInfoListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated SwitchInfo switchInfoList = 3;
}

message GetPartitionCountRequest {
    Context context = 1;
    PartitionInfoAttr infoAttr = 2;
    uint32 numGpus = 3;        //!<  GPU Size partitions(Optional)
    uint32 numNodes = 4;       //!<  Number of Compute nodes (Optional)
    PartitionHealth health = 5;         //!<  Partition Health (Optional)
    string gatewayId = 6;
}

message GetPartitionCountResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    uint32 numPartitions = 3;
}

message GetPartitionIdListRequest {
    Context context = 1;
    PartitionInfoAttr infoAttr = 2;
    uint32 numGpus = 3;          //!<  GPU Size partitions(Optional)
    uint32 numNodes = 4;         //!<  Number of Compute nodes (Optional)
    uint32 numPartitions = 5;
    PartitionHealth health = 6;           //!<  Partition Health (Optional)
    string gatewayId = 7;
}

message Partition {
    PartitionId partitionId = 1;
    uint32 numGpus = 2;
}

message GetPartitionIdListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated Partition partitionList = 3;
}

message GetPartitionInfoListRequest {
    Context context = 1;
    repeated PartitionId partitionIdList = 2;  // Optional - if IDs/Names not provided response includes all provisioned Partitions
    repeated string partitionNameList = 3;     // Optional - if IDs/Names not provided response includes all provisioned Partitions
    string gatewayId = 4;
}

message PartitionAttr {
    ResiliencyMode resiliencyMode = 1;
    uint32 multicastGroupsLimit = 3;
}

message PartitionInfo {
    PartitionId partitionId = 1;
    string name = 2;
    uint32 numGpus = 3;
    repeated GpuLocation gpuLocationList = 4;
    repeated uint64 gpuUidList = 5;
    PartitionHealth health = 6;
    PartitionType partitionType = 7;
    uint32 numAllocatedMulticastGroups = 8;
    PartitionAttr attr = 9;
}

message GetPartitionInfoListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated PartitionInfo partitionInfoList = 3;
}

message GpuLocation {
    Location loc = 1;
    uint32 gpuId = 2;
}

message GpuResourceId {
    oneof resourceId {
        GpuLocation gpuLocation = 1;              //!<  List of GPU locations
        uint64 gpuUid = 2;                    //!<  List of GPU Unique identifiers
    }
}

message CreatePartitionRequest {
    Context context = 1;
    string name = 2;    // optional, if specified must be unique
    repeated GpuResourceId gpuResourceId = 3;
    PartitionAttr attr = 4;
    PartitionId partitionId = 6;    //!<  Partition ID of newly created partition (OPTIONAL), if specified must be unique
    string gatewayId = 7;
}

message CreatePartitionResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    PartitionId partitionId = 3;
}

message DeletePartitionRequest {
    Context context = 1;
    PartitionId partitionId = 2; // can be set to 0 if name is provided
    string gatewayId = 3;
    string name = 4; // can be empty if partitionId is provided
}

message DeletePartitionResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    PartitionId partitionId = 3;
}

message UpdatePartitionRequest {
    Context context = 1;
    PartitionId partitionId = 2;  // can be set to 0 if name is provided
    repeated GpuLocation locationList = 3;    //!<  List of GPU locations (provide only if PartitionType=PARTITION_TYPE_LOCATION_BASED)
    repeated uint64 gpuUid = 4;          //!<  List of GPU Unique identifiers(provide only if PartitionType=PARTITION_TYPE_GPUUID_BASED)
    string gatewayId = 5;
    string name = 6; // can be empty if partitionId is provided
    bool reroute = 7; // default value is true, will be deprecated and then removed in future releases
}

message UpdatePartitionResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    PartitionId partitionId = 3;
}

message GetConnCountRequest {
    Context context = 1;
    ConnType connType = 2;
    ConnAttr connAttr = 3;
    Location loc = 4;
    string gatewayId = 5;
}

message GetConnCountResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    uint32 numConns = 3;
    string timeStamp = 4;        //!< Timestamp (UTC format - yyyy-mm-dd hh.mm.ss ) of last GFM connection update
}

message GetConnInfoListRequest {
    Context context = 1;
    ConnType connType = 2;
    ConnAttr connAttr = 3;
    uint32 numConns = 4;
    Location loc = 5;
    string gatewayId = 6;
}

message LinkEndPoint {
    Location loc = 1;
    uint32 switchOrgpuId = 2;
    uint32 cageNum = 3;
    uint32 cagePortNum = 4;
    uint32 cagePortSplitNum = 5;
    uint32 portNum = 6;
}

message ConnInfo {
    LinkEndPoint endPointA = 1;
    LinkEndPoint endPointB = 2;
    ConnType connType = 3;
    ConnState connState = 4;
}

message ConnInfoList {
    repeated ConnInfo connInfoList = 1;
}

message GetConnInfoListResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    ConnInfoList connInfoList = 3;
    string timeStamp = 4;        //!< Timestamp (UTC format - yyyy-mm-dd hh.mm.ss ) of last GFM connection update
}

message SubscribeRequest {
    string gatewayId = 1;
    bool notifyOnSelfChange = 2;
    uint32 heartBeatRate = 3;
}

message GetDomainPropertiesRequest {
    Context context = 1;
    string gatewayId = 2;
}

message GetDomainStateInfoRequest {
    Context context = 1;
    string gatewayId = 2;
}

message FactoryResetRequest {
    string gatewayId = 1;
}

message GetConnInfoCombinedRequest {
    Context context = 1;
    string gatewayId = 2;
}

message ConnInfoCombined {
    ServerHeader serverHeader = 1;
    Context context = 2;
    ConnInfoList unexpectedConnList = 3;
}

message TransceiverIdentifier {
    oneof chassisInfo {
        string chassisSerialNumber = 1;
        uint64 chassisId = 2;
    }
        uint64 slotId = 3;
        uint32 transceiverNum = 4;
}

message GetAdminStateRequest {
    Context context = 1;
    string gatewayId = 2;
    oneof adminStateEntity {
        TransceiverIdentifier transceiverIdentifier = 3;
    }
}

message AdminStateEntry {
    AdminState adminState = 1;
    oneof adminStateEntity {
        TransceiverIdentifier transceiverIdentifier = 2;
    }
}

message GetAdminStateResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    repeated AdminStateEntry adminStateEntry = 3;
}

message SetAdminStateRequest {
    Context context = 1;
    string gatewayId = 2;
    AdminStateEntry adminStateEntry = 3;
}

message SetAdminStateResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    AdminStateEntry adminStateEntry = 3;
}

message PartitionGpu {
    uint64 deviceUid = 1;
    LocationInfo locationInfo = 2;
}

message PartitionReport {
    PartitionId partitionId = 1;
    repeated PartitionGpu gpus = 2;
}

message GetStateReportRequest {
    Context context = 1;
    string gatewayId = 2;
    ReportType ReportType = 3;
}

message TopologyInfo {
    repeated DeviceTopoInfo deviceTopoInfo = 1;
}

message PartitionsReport {
    repeated PartitionReport partitions = 1;
}

message GetStateReportResponse {
    ServerHeader serverHeader = 1;
    Context context = 2;
    oneof report {
        TopologyInfo deviceTopoInfo = 3;
        PartitionsReport partitions = 4;
    }
}

service NMX_Controller {
    // Initial RPC call
    rpc Hello(ClientHello) returns (ServerHello) {};

    // Client subscription for push notifications on updates
    rpc Subscribe(SubscribeRequest) returns (stream ServerNotification) {};

    // Factory reset for state and configuration
    rpc FactoryReset(FactoryResetRequest) returns (ReturnCode) {};

    // Get/Set static configuration
    rpc GetStaticConfig(GetStaticConfigRequest) returns (StaticConfigResponse) {};
    rpc SetStaticConfig(SetStaticConfigRequest) returns (ReturnCode) {};

    // AdminState management
    rpc GetAdminState(GetAdminStateRequest) returns (GetAdminStateResponse);
    rpc SetAdminState(SetAdminStateRequest) returns (SetAdminStateResponse);

    // GFM SDK APIs
    rpc GetDomainProperties(GetDomainPropertiesRequest) returns (DomainProperties) {};
    rpc GetDomainStateInfo(GetDomainStateInfoRequest) returns (DomainStateInfo) {};
    rpc GetTopologyInfo(GetTopologyInfoRequest) returns (FmTopologyInfo) {};
    rpc GetComputeNodeCount(GetComputeNodeCountRequest) returns (GetComputeNodeCountResponse) {};
    rpc GetComputeNodeLocationList(GetComputeNodeLocationListRequest) returns (GetComputeNodeLocationListResponse) {};
    rpc GetComputeNodeInfoList(GetComputeNodeInfoListRequest) returns (GetComputeNodeInfoListResponse) {};
    rpc GetGpuInfoList(GetGpuInfoListRequest) returns (GetGpuInfoListResponse) {};
    rpc GetSwitchNodeCount(GetSwitchNodeCountRequest) returns (GetSwitchNodeCountResponse) {};
    rpc GetSwitchNodeLocationList(GetSwitchNodeLocationListRequest) returns (GetSwitchNodeLocationListResponse) {};
    rpc GetSwitchNodeInfoList(GetSwitchNodeInfoListRequest) returns (GetSwitchNodeInfoListResponse) {};
    rpc GetSwitchInfoList(GetSwitchInfoListRequest) returns (GetSwitchInfoListResponse) {};
    rpc GetPartitionCount(GetPartitionCountRequest) returns (GetPartitionCountResponse) {};
    rpc GetPartitionIdList(GetPartitionIdListRequest) returns (GetPartitionIdListResponse) {};
    rpc GetPartitionInfoList(GetPartitionInfoListRequest) returns (GetPartitionInfoListResponse) {};
    rpc CreatePartition(CreatePartitionRequest) returns (CreatePartitionResponse) {};
    rpc DeletePartition(DeletePartitionRequest) returns (DeletePartitionResponse) {};
    rpc AddGpusToPartition(UpdatePartitionRequest) returns (UpdatePartitionResponse) {};
    rpc RemoveGpusFromPartition(UpdatePartitionRequest) returns (UpdatePartitionResponse) {};
    rpc GetConnCount(GetConnCountRequest) returns (GetConnCountResponse) {};
    rpc GetConnInfoList(GetConnInfoListRequest) returns (GetConnInfoListResponse) {};
    rpc GetConnInfoCombined(GetConnInfoCombinedRequest) returns (ConnInfoCombined) {};

    // Get state reports
    rpc GetStateReport(GetStateReportRequest) returns (GetStateReportResponse) {};
}